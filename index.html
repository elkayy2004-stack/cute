<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You 💖</title>

<style>
body {
    margin: 0;
    font-family: 'Comic Sans MS', cursive;
    background: linear-gradient(to bottom, #ffb6d9, #ffe6f2);
    text-align: center;
    overflow: hidden;
}

#btn {
    margin-top: 40vh;
    padding: 15px 30px;
    font-size: 22px;
    border: none;
    border-radius: 30px;
    background: #ff4d94;
    color: white;
    cursor: pointer;
}

#scene {
    display: none;
    padding-top: 30px;
}

img {
    width: 300px;
    border-radius: 20px;
}

#text {
    font-size: 22px;
    color: #ff0066;
    margin-top: 20px;
    min-height: 80px;
    white-space: pre-line;
}

.heart {
    position: absolute;
    font-size: 20px;
    animation: float 5s linear infinite;
}

@keyframes float {
    from { transform: translateY(100vh); opacity: 1; }
    to { transform: translateY(-10vh); opacity: 0; }
}
</style>
</head>

<body>

<button id="btn" onclick="start()">Click me 💖</button>

<div id="scene">
    <!-- Replace this with your generated image if you want -->
    <img src="WhatsApp Image 2026-04-21 at 10.54.06 PM.jpeg">

    <div id="text"></div>
</div>

<script>

function start() {
    document.getElementById("btn").style.display = "none";
    document.getElementById("scene").style.display = "block";

    let message = "You are so strong 💪\nAnd I am so lucky to have you ❤️\n\nYou got this ✨\nI am so proud of you 💖";
    let i = 0;

    function type() {
        if (i < message.length) {
            document.getElementById("text").innerHTML += message.charAt(i);
            i++;
            setTimeout(type, 40);
        }
    }

    type();
}

// floating hearts
setInterval(() => {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 5000);
}, 300);

</script>

</body>
</html>
